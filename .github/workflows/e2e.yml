name: E2E Tests

on:
  push:
    branches:
      - main
      - "v*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1.20.4
        with:
          elixir-version: "1.19.1"
          otp-version: "28.1.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: testing/package-lock.json

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            testing/deps
            testing/_build
          key: ${{ runner.os }}-mix-e2e-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-e2e-

      - name: Install Elixir Dependencies (Root)
        run: mix deps.get

      - name: Install Elixir Dependencies (Testing App)
        working-directory: ./testing
        run: mix deps.get

      - name: Install NPM Dependencies (Testing App)
        working-directory: ./testing
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./testing
        run: npx playwright install --with-deps firefox

      - name: Pre-compile Testing App for Test
        working-directory: ./testing
        run: MIX_ENV=test mix compile

      - name: Run E2E Script
        run: mix e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: testing/playwright-report/
          retention-days: 5
