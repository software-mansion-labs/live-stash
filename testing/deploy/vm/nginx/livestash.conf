# LiveView-aware load balancer for the app cluster.
# Runs on the obs VM. Install: copy to /etc/nginx/conf.d/livestash.conf
# (remove the default site), replace APP_VM_* with real IPs, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# k6 points HOST at this nginx (OBS_VM:80); reconnects round-robin across the
# app nodes, which exercises ETS node-hint / Mnesia cross-node recovery.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream phoenix {
    least_conn;
    server APP_VM_1:4000;
    server APP_VM_2:4000;
    # server APP_VM_3:4000;
}

server {
    listen 80;

    location / {
        proxy_pass         http://phoenix;
        proxy_http_version 1.1;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket upgrade (required for LiveView).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep WebSocket connections alive for the duration of the test.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
