# /etc/sysctl.d/99-livestash-app.conf  (app VM)
# Mirrors the docker-compose.app.yml sysctls. Apply with: sudo sysctl --system

# Accept-queue depth — must be >= Bandit's backlog (16384 in runtime.exs).
net.core.somaxconn = 16384

# SYN queue — small default (128) becomes a wall under fast connection ramps.
net.ipv4.tcp_max_syn_backlog = 16384
