# /etc/sysctl.d/99-livestash-load.conf  (k6 load VM)
# Mirrors the docker-compose.k6.yml sysctls. Apply with: sudo sysctl --system

# Widen the ephemeral port range — each VU opens several short-lived sockets;
# at thousands of VUs the default range is exhausted.
net.ipv4.ip_local_port_range = 1024 65535

# Reuse sockets stuck in TIME_WAIT for new outbound connections.
net.ipv4.tcp_tw_reuse = 1
