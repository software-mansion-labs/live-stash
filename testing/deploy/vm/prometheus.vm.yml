global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # Phoenix app cluster (scraped directly, not through nginx — per-node metrics).
  - job_name: testing_app
    static_configs:
      - targets: ["10.10.0.3:4000"]
        labels: { instance: "app-1" }
      - targets: ["10.10.0.4:4000"]
        labels: { instance: "app-2" }
      # - targets: ["APP_VM_3:4000"]
      #   labels: { instance: "app-3" }

  # node_exporter on every VM — now on the host, so its network I/O is real.
  - job_name: node
    static_configs:
      - targets:
          - "10.10.0.3:9100"
          - "10.10.0.4:9100"
          - "10.10.0.5:9100"
          - "10.10.0.2:9100"

  # redis_exporter on the redis VM.
  - job_name: redis
    static_configs:
      - targets: ["10.10.0.5:9121"]
