# /etc/security/limits.d/99-livestash.conf
# fd limit for the livestash user (app VM) and whoever runs k6 (load VM).
# The app service already sets LimitNOFILE via systemd; this covers
# interactive shells and the k6 run user.

livestash soft nofile 1048576
livestash hard nofile 1048576

# k6 on the load VM is typically run over SSH as root. The * wildcard does NOT
# apply to root, so set it explicitly.
root soft nofile 1048576
root hard nofile 1048576


