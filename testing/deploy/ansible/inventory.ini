# Ansible reaches every VM over its PUBLIC IP (your laptop can't route the
# 10.10.0.x private net). `private_ip` is what the VMs use to talk to each
# other — it drives clustering, the redis URL, prometheus targets, nginx, etc.

[app]
app-1 ansible_host=37.27.20.234 private_ip=10.10.0.3
app-2 ansible_host=37.27.3.30   private_ip=10.10.0.4

[redis]
redis-vm ansible_host=37.27.27.84  private_ip=10.10.0.5

[obs]
obs-vm   ansible_host=37.27.16.253 private_ip=10.10.0.2

[load]
load-vm  ansible_host=46.62.151.189 private_ip=10.10.0.6

[all:vars]
ansible_user=root
ansible_python_interpreter=/usr/bin/python3
ansible_port=2222