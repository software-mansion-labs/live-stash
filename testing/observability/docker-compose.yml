services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: testing_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=14d
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Needed on Linux so `host.docker.internal` in prometheus.yml resolves
    # to the host machine. On Docker Desktop (Mac/Windows) it's a no-op.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: testing_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/templates:ro
    environment:
      APP_VM_1: "${APP_VM_1:-127.0.0.1}"
      APP_VM_2: "${APP_VM_2:-127.0.0.1}"
      APP_VM_3: "${APP_VM_3:-}"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: testing_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
