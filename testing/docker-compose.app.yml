services:
  app:
    build:
      context: ..
      dockerfile: testing/Dockerfile
    container_name: testing_app
    ports:
      - "4000:4000"
    environment:
      PHX_SERVER: "true"
      PHX_HOST: "${PHX_HOST:-localhost}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      # Redis adapter target. Locally (everything in one compose project) the
      # redis service is reachable by its service name on the shared network.
      # For multi-VM, set REDIS_HOST to the redis VM's IP.
      LIVE_STASH_REDIS_URL: "redis://${REDIS_HOST:-redis}:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: testing_node_exporter
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped
