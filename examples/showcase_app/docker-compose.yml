services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  node_a:
    build: .
    hostname: node_a
    working_dir: /workspace/examples/showcase_app
    command: sh -c "mix deps.get && epmd -daemon && elixir --sname a@node_a --cookie livestashexamplecluster -S mix phx.server"
    environment:
      - PORT=4000
    ports:
      - "4002:4000"
    volumes:
      - ../../:/workspace
      - /workspace/examples/showcase_app/_build
      - /workspace/examples/showcase_app/deps
      - /workspace/_build
      - /workspace/deps
    depends_on:
      redis:
        condition: service_healthy

  node_b:
    build: .
    hostname: node_b
    working_dir: /workspace/examples/showcase_app
    command: sh -c "mix deps.get && epmd -daemon && elixir --sname b@node_b --cookie livestashexamplecluster -S mix phx.server"
    environment:
      - PORT=4000
    ports:
      - "4001:4000"
    volumes:
      - ../../:/workspace
      - /workspace/examples/showcase_app/_build
      - /workspace/examples/showcase_app/deps
      - /workspace/_build
      - /workspace/deps
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node_a
      - node_b
